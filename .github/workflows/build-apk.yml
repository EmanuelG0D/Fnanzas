name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Permite ejecutar la compilación manualmente en GitHub

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for Gradle Wrapper (if exists)
        run: chmod +x gradlew || true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5 # En caso de que no haya wrapper configurado

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: appfinanzas-apk
          path: app/build/outputs/apk/debug/app-debug.apk
